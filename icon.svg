<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Fellowship Trainer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14181f"/>
      <stop offset="1" stop-color="#0d1015"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="56" y="56" width="400" height="400" rx="84" fill="none" stroke="#29323f" stroke-width="2"/>
  <!-- the brand diamond: a rotated square in the app's cyan-teal accent -->
  <g transform="translate(256 236) rotate(45)" filter="url(#glow)">
    <rect x="-92" y="-92" width="184" height="184" rx="26" fill="#4fe3c7"/>
  </g>
  <text x="256" y="430" text-anchor="middle"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="56" font-weight="700" letter-spacing="6" fill="#e7ebf2">FT</text>
</svg>
