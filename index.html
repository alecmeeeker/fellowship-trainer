<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover so the layout extends under iOS notch/home-indicator;
       pinch-zoom is left ENABLED (no maximum-scale/user-scalable) for accessibility. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Fellowship Trainer</title>
  <meta name="description" content="A browser-based trainer for a multi-level, project-based coding assessment — runs real Python in your browser." />

  <!-- Mobile / installable-web-app chrome -->
  <meta name="theme-color" content="#0d1015" />
  <meta name="color-scheme" content="dark" />

  <!-- THEME BOOT (FOUC kill): sets data-theme/-font-scale/-motion on <html>
       BEFORE any CSS loads, so the first paint already uses the saved theme.
       Reads the same localStorage key + settings.theme path the store writes.
       Keep VALID/TC/DEFAULT in sync with js/services/theme-manager.js. -->
  <script>
    (function () {
      var VALID = { dark: 1, win95: 1, springbreak95: 1, xfiles: 1 };
      var TC = { dark: "#0d1015", win95: "#008080", springbreak95: "#ff1f8f", xfiles: "#16221b" };
      var DEFAULT = "win95";
      var d = document.documentElement;
      try {
        var raw = localStorage.getItem("fellowship-trainer:v1");
        var s = raw ? JSON.parse(raw) : null;
        var set = (s && s.settings) || {};
        var t = VALID[set.theme] ? set.theme : DEFAULT;
        d.setAttribute("data-theme", t);
        if (set.fontScale === "s" || set.fontScale === "l") d.setAttribute("data-font-scale", set.fontScale);
        if (set.reduceMotion) d.setAttribute("data-motion", "reduce");
        var scheme = t === "dark" ? "dark" : "light";
        d.style.colorScheme = scheme;
        var mc = document.querySelector('meta[name="theme-color"]'); if (mc && TC[t]) mc.setAttribute("content", TC[t]);
        var ms = document.querySelector('meta[name="color-scheme"]'); if (ms) ms.setAttribute("content", scheme);
      } catch (e) {
        d.setAttribute("data-theme", DEFAULT);
        d.style.colorScheme = "light";
      }
    })();
  </script>

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Trainer" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400;1,500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- CodeMirror 5 — no-build CDN drop-in editor with a Python mode -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/settings.css" />
  <!-- Themes: token overrides scoped to :root[data-theme="ID"]. The base
       css/theme.css :root IS the "dark" theme, so no dark.css is needed. -->
  <link rel="stylesheet" href="css/themes/win95.css" />
  <link rel="stylesheet" href="css/themes/springbreak95.css" />
  <link rel="stylesheet" href="css/themes/xfiles.css" />
  <!-- mobile.css MUST stay last: its media queries override the desktop rules above -->
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>
  <div id="app" aria-busy="true"></div>
  <noscript>Fellowship Trainer requires JavaScript.</noscript>
  <script type="module" src="js/main.js"></script>
</body>
</html>
